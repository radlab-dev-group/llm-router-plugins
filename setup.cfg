[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .git,__pycache__,build,dist,rest_api_test.py
per-file-ignores =
    # Intentional re-exports with inherently long import paths.
    llm_router_plugins/maskers/fast_masker/rules/__init__.py:E501
    # Tests that use sys.path.insert before local imports.
    tests/*:E402
